# Docker is the primary dev workflow.
#   docker compose up dev   → Vite live-reload dev server at http://localhost:5173
services:
  dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - node_modules:/app/node_modules # named volume so deps persist across runs

volumes:
  node_modules:
